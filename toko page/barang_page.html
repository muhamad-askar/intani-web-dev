<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko/Barang</title>
    <link rel="stylesheet" href="barang_page.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="logo.png" alt="InTani">
            </div>
            <div class="search-wrapper">
                <img src="Cari.png" alt="Cari ">
                <input type="text" placeholder="Cari di sini...">
            </div>
            <div class="nav-links">
                <a href="#">jual-beli ▾</a>
                <a href="#">sewa ▾</a>
                <div class="nav-icons">
                    <img src="cart.png" alt="Cart" class="icon-img">
                    <img src="profile.png" alt="Profile" class="icon-img">
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="section-1">
            <div class="path">
                <a href="../home.html">Home</a>
                <a href="javascript:history.back()" class="btn-back" id="dynamic-katalog">Katalog</a>
                <a href="barang_page.html">/ Barang XXX</a>
            </div>
        </section>
    </main>
    <script>
    //ambil data dari URL (misal: ?name=Katalog%20A)
    const urlParams = new URLSearchParams(window.location.search);
    const namaKatalog = urlParams.get('name'); // Isinya bakal "Katalog A"

    // 2. Cari elemen breadcrumb tadi
    const breadcrumbLink = document.getElementById('dynamic-katalog');

    // 3. Kalau datanya ada, ganti tulisannya!
    if (namaKatalog) {
        breadcrumbLink.innerText = namaKatalog;
    }
</script>
</body>
</html>
