<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barang</title>
    <link rel="stylesheet" href="barang_page.css">
    <link rel="stylesheet" href="../navigation.css">
    <link rel="stylesheet" href="../component/breadcrumb/breadcrumb.css">
    <link rel="stylesheet" href="../component/product-container/product-container.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div id="pathbar-placeholder"></div>
    <div id="product-placeholder"></div>
    
    <main>
        <section class="card-store">
            <img id="store-img" src="../asset_foto/" alt="store">
            <div class="store-info">
                <h1 id="store-name">Toko Farmayu</h1>
                <div class="store-button">
                    <a id="btn-ke-toko" href="#" class="btn-store">Kunjungi Toko</a>
                    <a href="chat_page.html" class="btn-store">Chat Toko</a>
                </div>
            </div>
        </section>

        <section class="review-section">
            <h3>Penilaian Produk</h3>
            <div class="review-card">
                <img id="user-avatar" src="../asset_foto/placeholder.jpg" alt="user-icon">
                <div class="review-box">
                    <div class="user-header">
                        <h1>Bimok</h1>
                        <span class="stars">★★★★★</span>
                    </div>
                    <p>Ini komentar untuk fitur komen pada kolom komentar</p>
                </div>
            </div>
            <div class="review-card">
                <img id="user-avatar" src="../asset_foto/placeholder.jpg" alt="user-icon">
                <div class="review-box">
                    <div class="user-header">
                        <h1>Lutfi wahyudi</h1>
                        <span class="stars">★★</span>
                    </div>
                    <p>Barang jelek tidak sesuai keinginan</p>
                </div>
            </div>
        </section>
        <div class="chat-input-area">
            <input type="text" placeholder="Tulis komentar...">
            <button class="btn-send">➤</button>
        </div>
    </main>

    <script src="/global.js"></script>
    <script src="../component/breadcrumb/breadcrumb.js"></script>
    <script src="../component/product-container/product-container.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Load Navbar manual (tetep ada)
            fetch('../navigation.html')
                .then(res => res.text())
                .then(data => document.getElementById('navbar-placeholder').innerHTML = data);

            // --- FIX: OPER SEMUA DATA KE TOKO ---
            const p = new URLSearchParams(window.location.search);
            const btnKeToko = document.getElementById('btn-ke-toko');
            
            if (btnKeToko) {
                // Ambil semua data produk yang ada di URL sekarang, tambahin info toko
                const dataProduk = p.toString();
                btnKeToko.href = `toko_page.html?${dataProduk}&toko=Toko-Intani`;
            }
        });
    </script>
</body>
</body>
</html>
