<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil User - InTani</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="user.css" />
    <link rel="stylesheet" href="../component/breadcrumb/breadcrumb.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>
    <div id="pathbar-placeholder"></div>

    <div class="main-wrapper">
      <div class="box">
        <div class="profil">
          <div class="foto">
            <img
              src="../asset_foto/ikon/user.png"
              alt="User Avatar"
              style="width: 100%; height: 100%; object-fit: cover"
            />
          </div>
          <div class="info-profil">
            <h1 id="header-nama">Nama user</h1>
            <p>nama toko<span class="toko" id="header-toko">Belum ada toko</span></p>
          </div>
        </div>
      </div>

      <div class="area-tengah">
        <main class="profil-deskripsi">
          <h2>Profil saya</h2>
          <div class="form-container">
            <div class="form-inputan">
              <div class="form-group">
                <label>nama</label>
                <input type="text" id="input-nama" placeholder="nama profil" value="" />
              </div>

              <div class="form-group">
                <label>nama toko</label>
                <input type="text" id="input-toko" placeholder="Masukkan nama toko Anda" value="" />
              </div>

              <div class="form-group">
                <label>email</label>
                <input type="email" id="input-email" placeholder="Email" value="" />
              </div>

              <div class="form-group">
                <label>no. hp</label>
                <input type="text" id="input-hp" placeholder="No HP" value="" />
              </div>

              <div class="form-group">
                <label>alamat</label>
                <input type="text" id="textarea-alamat" placeholder="alamat lengkap" value="" />
              </div>

              <div class="tombol-aksi" >
                <button id="btn-simpan" class="btn btn-save">Simpan</button>
                <button id="btn-logout" class="btn btn-logout" >Logout</button>
              </div>
            </div>

            <div class="photo-edit">
              <div class="avatar-mid" >
                <img src="../asset_foto/ikon/user.png" alt="User" />
              </div>
              <button class="btn-ganti">Ganti profil</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="./global.js"></script>
    <script src="../component/breadcrumb/breadcrumb.js"></script>
    
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const sesiAktif = localStorage.getItem("sesiInTani");

        if (!sesiAktif) {
          window.location.href = "login.html";
          return;
        }

        const headerNama = document.getElementById("header-nama");
        const headerToko = document.getElementById("header-toko");
        
        const inputNama = document.getElementById("input-nama");
        const inputToko = document.getElementById("input-toko");
        const inputEmail = document.getElementById("input-email");
        const inputHp = document.getElementById("input-hp");
        const inputAlamat = document.getElementById("textarea-alamat"); 

        headerNama.innerText = sesiAktif.toLowerCase();

        const profilTersimpan = JSON.parse(localStorage.getItem(`profil_${sesiAktif}`));

        if (profilTersimpan) {
          inputNama.value = profilTersimpan.nama || "";
          inputToko.value = profilTersimpan.toko || "";
          inputEmail.value = profilTersimpan.email || "";
          inputHp.value = profilTersimpan.hp || "";
          inputAlamat.value = profilTersimpan.alamat || "";
          
          headerToko.innerText = profilTersimpan.toko || "Belum ada toko";
        } else {
   
          inputNama.value = sesiAktif;
        }

        const btnSimpan = document.getElementById("btn-simpan");
        btnSimpan.addEventListener("click", function () {
          const dataBaru = {
            nama: inputNama.value,
            toko: inputToko.value,
            email: inputEmail.value,
            hp: inputHp.value,
            alamat: inputAlamat.value,
          };

          localStorage.setItem(`profil_${sesiAktif}`, JSON.stringify(dataBaru));

          headerNama.innerText = inputNama.value.toLowerCase();
          headerToko.innerText = inputToko.value || "Belum ada toko";

          const teksAwal = btnSimpan.innerText;
          btnSimpan.innerText = "Tersimpan ✓";
          btnSimpan.style.backgroundColor = "#5da832";
          
          setTimeout(() => {
              btnSimpan.innerText = teksAwal;
              btnSimpan.style.backgroundColor = "#89C4F4"; 
          }, 2000);
        });

        const btnLogout = document.getElementById("btn-logout");
        if (btnLogout) {
          btnLogout.addEventListener("click", function () {
            localStorage.removeItem("sesiInTani");
            window.location.href = "login.html";
          });
        }
      });
    </script>
  </body>
</html>
