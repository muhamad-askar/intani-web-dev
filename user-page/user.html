<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="user.css" />
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <div class="bar">
      <div class="ikon">
        <img src="../asset_foto/ikon/logo.png" alt="ikon_home" width="24" />
      </div>
      <div class="bar2">Home / Keranjang</div>
    </div>

    <div class="main-wrapper">
      <div class="box">
        <div class="profil">
          <div class="foto"></div>
          <div class="info-profil">
            <h1>Nama user</h1>
            <p>nama toko <span class="toko">nama toko</span></p>
          </div>
        </div>
      </div>

      <div class="area-tengah">
        <div class="tengah-kiri">
          <aside class="samping">
            <ul>
              <li>Profil saya</li>
              <li>Pesanan saya</li>
            </ul>
          </aside>
        </div>

        <main class="profil-deskripsi">
          <h2>Profil saya</h2>
          <div class="form">
            <div class="form2">
              <div class="form-group">
                <label>nama</label>
                <div class="field">nama profil</div>
              </div>
              <div class="form-group">
                <label>email</label>
                <div class="field">user@gmail.com</div>
              </div>
              <div class="form-group">
                <label>no. hp</label>
                <div class="field">0812-3456-7890</div>
              </div>
              <div class="form-group">
                <label>alamat</label>
                <div class="field textarea">alamat user</div>
              </div>
              <button class="btn-simpan">Simpan</button>
            </div>

            <div class="photo-edit">
              <div class="avatar-mid">
                <img src="../asset_foto/ikon/user.png" alt="User" />
              </div>
              <button class="btn-ganti">Ganti profil</button>
            </div>
          </div>
        </main>
      </div>
    </div>
    <div id="footer-placeholder"></div>

    <script src="/global.js"></script>
  </body>
</html>
