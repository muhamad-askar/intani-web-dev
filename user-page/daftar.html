<script>
  const formDaftar = document.getElementById("form-daftar");
  formDaftar.addEventListener("submit", function(e) {
      e.preventDefault();
      const inputs = formDaftar.querySelectorAll("input");
      const username = inputs[0].value;
      const password = inputs[1].value;
      
      localStorage.setItem("akunInTani", JSON.stringify({ username: username, password: password }));
      alert("Pendaftaran berhasil! Silakan login.");
      window.location.href = "login.html";
  });

  const toggleDaftar = document.getElementById("toggle-password-daftar");
  const inputDaftar = document.getElementById("input-password-daftar");
  
  toggleDaftar.addEventListener("click", function () {
    if (inputDaftar.type === "password") {
      inputDaftar.type = "text";
      toggleDaftar.innerText = "🙈";
    } else {
      inputDaftar.type = "password";
      toggleDaftar.innerText = "👁️";
    }
  });
