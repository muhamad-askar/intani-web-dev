<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="login.css">
  <title>Login - InTani</title>
</head>
<body>
  
<div class="kiri">
  <div> <img src="../asset_foto/ikon/logo-intani.png" class="logo"> </div>
  <div style="cursor: pointer;" onclick="window.history.back()">Kembali</div>
</div>

<div class="kanan">
  <form id="form-login">
    <h2>Login</h2>
    <input type="text" placeholder="Username" required>
    
    <div style="position: relative; width: 100%;">
      <input type="password" id="input-password" placeholder="Password" required style="width: 100%; box-sizing: border-box; padding-right: 40px;">
      <span id="toggle-password" style="position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none;">👁️</span>
    </div>

    <button type="submit" class="tombol-login" style="margin-top: 15px;">Login</button>
    <a href="#">lupa password?</a>
    <p>----atau----</p>
    <button type="button">Google</button>
    <div class="daftar"> baru di intani ? <a href="daftar.html">daftar</a></div>
  </form>
</div>

<script>
  const formLogin = document.getElementById("form-login");
  formLogin.addEventListener("submit", function(e) {
      e.preventDefault();
      const inputs = formLogin.querySelectorAll("input");
      const username = inputs[0].value;
      const password = inputs[1].value;
      const akunTersimpan = JSON.parse(localStorage.getItem("akunInTani"));

      if (akunTersimpan && username === akunTersimpan.username && password === akunTersimpan.password) {
          localStorage.setItem("sesiInTani", username);
          window.location.href = "../home.html";
      } else {
          alert("Gagal: Username atau Password salah!");
      }
  });

 
  const togglePassword = document.getElementById("toggle-password");
  const inputPassword = document.getElementById("input-password");
  
  togglePassword.addEventListener("click", function () {
    if (inputPassword.type === "password") {
      inputPassword.type = "text";
      togglePassword.innerText = ""; 
    } else {
      inputPassword.type = "password";
      togglePassword.innerText = ""; 
    }
  });



  formLogin.addEventListener("submit", function(e) {
      e.preventDefault();
      const inputs = formLogin.querySelectorAll("input");
      const username = inputs[0].value;
      const password = inputs[1].value;
      const akunTersimpan = JSON.parse(localStorage.getItem("akunInTani"));

      if (akunTersimpan && username === akunTersimpan.username && password === akunTersimpan.password) {
          localStorage.setItem("sesiInTani", username);
          window.location.href = "../home.html";
      } else {
          alert("Gagal: Username atau Password salah!");
      }
  });

</script>

</body>
</html>
