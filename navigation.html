<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="navigation.css" />
  </head>
  <body>
    <header class="navbar-container">
      <nav class="navbar">
        <div class="logo">
          <img src="asset_foto/ikon/logo-intani.png" alt="InTani" />
        </div>
        <div class="search-wrapper">
          <img src="asset_foto/ikon/search.png" alt="Cari " />
          <input type="text" id="input-search" placeholder="Cari..." />
        </div>
        <div class="nav-links">
          <a href="#">jual-beli ▾</a>
          <a href="#">sewa ▾</a>
          <div class="nav-icons">
            <a href="transaksi page/transaksi.html">
              <img
                src="asset_foto/ikon/keranjang.png"
                alt="Cart"
                class="icon-img"
              />
            </a>
            <a href="user.page/login.html">
              <img
                src="asset_foto/ikon/user.png"
                alt="Profile"
                class="icon-img"
              />
            </a>
          </div>
        </div>
      </nav>
    </header>
    <script>
      const inputSearch = document.getElementById("input-search");
      const searchWrapper = document.querySelector(".search-wrapper");

      const dropdownSaran = document.createElement("div");
      dropdownSaran.id = "dropdown-saran";
      searchWrapper.appendChild(dropdownSaran);

      const dataSaran = [
        "Benih Tomat Super",
        "Benih Cabai Rawit",
        "Pupuk Kompos Organik",
        "Cangkul Baja",
        "Pestisida Alami",
        "Bibit Padi Unggul",
        "Selang Air Irigasi",
        "Traktor Mini",
      ];

      inputSearch.addEventListener("input", function () {
        const teks = this.value.toLowerCase();
        dropdownSaran.innerHTML = "";

        if (teks.length > 0) {
          const hasilFilter = dataSaran.filter((item) =>
            item.toLowerCase().includes(teks),
          );

          if (hasilFilter.length > 0) {
            dropdownSaran.style.display = "block";

            hasilFilter.forEach((item) => {
              const divItem = document.createElement("div");
              divItem.classList.add("item-saran");
              divItem.innerText = item;

              divItem.addEventListener("click", function () {
                inputSearch.value = item;
                dropdownSaran.style.display = "none";
              });

              dropdownSaran.appendChild(divItem);
            });
          } else {
            dropdownSaran.style.display = "none";
          }
        } else {
          dropdownSaran.style.display = "none";
        }
      });

      document.addEventListener("click", function (e) {
        if (!searchWrapper.contains(e.target)) {
          dropdownSaran.style.display = "none";
        }
      });
    </script>
  </body>
</html>
